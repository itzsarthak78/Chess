<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChessTruffy.io</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Background particles -->
  <div class="bg-particles" id="bgParticles"></div>

  <!-- Header -->
  <header class="site-header">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 40 40" width="40" height="40" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="28" width="32" height="5" rx="2" fill="#c9a84c"/>
          <rect x="8" y="22" width="24" height="7" rx="1.5" fill="#c9a84c"/>
          <rect x="14" y="6" width="12" height="17" rx="2" fill="#c9a84c"/>
          <rect x="12" y="10" width="16" height="3" rx="1" fill="#8b6914"/>
          <circle cx="20" cy="5" r="3" fill="#c9a84c"/>
          <rect x="17" y="2" width="6" height="4" rx="1" fill="#c9a84c"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">ChessTruffy</span>
        <span class="logo-domain">.io</span>
      </div>
    </div>
    <nav class="header-nav">
      <button class="nav-btn" id="btnNewGame">New Game</button>
      <button class="nav-btn" id="btnUndo">Undo</button>
      <button class="nav-btn" id="btnFlip">Flip Board</button>
    </nav>
  </header>

  <!-- Main layout -->
  <main class="main-layout">

    <!-- Left Panel -->
    <aside class="panel panel-left">
      <div class="player-card" id="cardTop">
        <div class="player-avatar" id="avatarTop">
          <svg viewBox="0 0 50 50" width="44" height="44" xmlns="http://www.w3.org/2000/svg">
            <circle cx="25" cy="18" r="10" fill="#1a1a2e" stroke="#c9a84c" stroke-width="1.5"/>
            <path d="M5 45 Q25 30 45 45" fill="#1a1a2e" stroke="#c9a84c" stroke-width="1.5"/>
            <!-- Crown for black player -->
            <polygon points="18,12 22,7 25,11 28,7 32,12" fill="#c9a84c"/>
          </svg>
        </div>
        <div class="player-info">
          <div class="player-name" id="nameTop">Dark Side</div>
          <div class="player-color-tag black-tag">Black</div>
        </div>
        <div class="captured-pieces" id="capturedByTop"></div>
        <div class="timer" id="timerTop">10:00</div>
      </div>

      <div class="move-log-wrap">
        <div class="panel-title">Move History</div>
        <div class="move-log" id="moveLog"></div>
      </div>

      <div class="player-card" id="cardBottom">
        <div class="player-avatar" id="avatarBottom">
          <svg viewBox="0 0 50 50" width="44" height="44" xmlns="http://www.w3.org/2000/svg">
            <circle cx="25" cy="18" r="10" fill="#1a4a8a" stroke="#4fc3f7" stroke-width="1.5"/>
            <path d="M5 45 Q25 30 45 45" fill="#1a4a8a" stroke="#4fc3f7" stroke-width="1.5"/>
            <!-- Crown for blue player -->
            <polygon points="18,12 22,7 25,11 28,7 32,12" fill="#4fc3f7"/>
          </svg>
        </div>
        <div class="player-info">
          <div class="player-name" id="nameBottom">Blue Force</div>
          <div class="player-color-tag blue-tag">Blue</div>
        </div>
        <div class="captured-pieces" id="capturedByBottom"></div>
        <div class="timer" id="timerBottom">10:00</div>
      </div>
    </aside>

    <!-- Board area -->
    <section class="board-section">
      <div class="board-container">
        <div class="board-coords-letters" id="coordLettersTop"></div>
        <div class="board-row-mid">
          <div class="board-coords-numbers" id="coordNumsLeft"></div>
          <div class="chess-board" id="chessBoard"></div>
          <div class="board-coords-numbers" id="coordNumsRight"></div>
        </div>
        <div class="board-coords-letters" id="coordLettersBottom"></div>
      </div>
      <div class="status-bar" id="statusBar">
        <span id="statusText">Setting up the board...</span>
      </div>
    </section>

    <!-- Right Panel -->
    <aside class="panel panel-right">
      <div class="panel-title">Game Mode</div>
      <div class="mode-selector">
        <button class="mode-btn active" id="mode2P" data-mode="2player">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="8" cy="7" r="4"/><path d="M2 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
            <circle cx="18" cy="7" r="3"/><path d="M22 21v-2a3 3 0 0 0-3-3h-1"/>
          </svg>
          2 Players
        </button>
        <button class="mode-btn" id="modeBot" data-mode="bot">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="8" width="18" height="12" rx="3"/>
            <circle cx="9" cy="14" r="1.5"/><circle cx="15" cy="14" r="1.5"/>
            <path d="M12 2v4M8 8V4M16 8V4"/><path d="M3 14h2M19 14h2"/>
          </svg>
          vs Bot
        </button>
      </div>

      <div class="difficulty-wrap" id="difficultyWrap">
        <div class="panel-title">Bot Difficulty</div>
        <div class="difficulty-selector">
          <button class="diff-btn" data-diff="1">Easy</button>
          <button class="diff-btn active" data-diff="3">Medium</button>
          <button class="diff-btn" data-diff="5">Hard</button>
          <button class="diff-btn" data-diff="7">Master</button>
        </div>
      </div>

      <div class="panel-title" style="margin-top:20px">Game Stats</div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-val" id="statMoves">0</div><div class="stat-lbl">Moves</div></div>
        <div class="stat-box"><div class="stat-val" id="statCaptures">0</div><div class="stat-lbl">Captures</div></div>
        <div class="stat-box"><div class="stat-val" id="statChecks">0</div><div class="stat-lbl">Checks</div></div>
        <div class="stat-box"><div class="stat-val" id="statTime">0:00</div><div class="stat-lbl">Game Time</div></div>
      </div>

      <div class="panel-title" style="margin-top:20px">Evaluation</div>
      <div class="eval-bar-wrap">
        <div class="eval-label" id="evalLabelBlack">0.0</div>
        <div class="eval-bar">
          <div class="eval-fill-black" id="evalFillBlack" style="height:50%"></div>
          <div class="eval-fill-blue" id="evalFillBlue" style="height:50%"></div>
        </div>
        <div class="eval-label" id="evalLabelBlue">0.0</div>
      </div>

      <button class="start-btn" id="startBtn">Start New Game</button>
    </aside>

  </main>

  <!-- Promotion modal -->
  <div class="modal-overlay" id="promotionModal">
    <div class="modal-box">
      <div class="modal-title">Pawn Promotion</div>
      <div class="modal-subtitle">Choose a piece</div>
      <div class="promotion-choices" id="promotionChoices"></div>
    </div>
  </div>

  <!-- Game over modal -->
  <div class="modal-overlay" id="gameOverModal">
    <div class="modal-box">
      <div class="trophy-icon" id="trophyIcon">
        <svg viewBox="0 0 80 80" width="80" height="80" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 10h50v30a25 25 0 0 1-50 0Z" fill="#c9a84c" opacity="0.9"/>
          <rect x="32" y="40" width="16" height="15" fill="#c9a84c"/>
          <rect x="22" y="55" width="36" height="8" rx="3" fill="#c9a84c"/>
          <path d="M15 15 H5 Q5 35 20 35" fill="none" stroke="#c9a84c" stroke-width="5" stroke-linecap="round"/>
          <path d="M65 15 H75 Q75 35 60 35" fill="none" stroke="#c9a84c" stroke-width="5" stroke-linecap="round"/>
          <polygon points="40,12 43,20 52,20 45,25 48,33 40,28 32,33 35,25 28,20 37,20" fill="#fff" opacity="0.8"/>
        </svg>
      </div>
      <div class="modal-title" id="gameOverTitle">Game Over</div>
      <div class="modal-subtitle" id="gameOverMsg">The game has ended</div>
      <div class="modal-actions">
        <button class="modal-btn primary" id="btnPlayAgain">Play Again</button>
        <button class="modal-btn secondary" id="btnReviewGame">Review</button>
      </div>
    </div>
  </div>

  <!-- Bot thinking indicator -->
  <div class="bot-thinking" id="botThinking">
    <div class="thinking-dots">
      <span></span><span></span><span></span>
    </div>
    <span>Bot is thinking...</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
